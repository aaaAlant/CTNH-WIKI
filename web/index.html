<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ctnh_wiki">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ctnh_wiki</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body,
    flutter-view {
      cursor: var(--app-cursor, auto);
    }

    a,
    button,
    [role="button"],
    input[type="button"],
    input[type="submit"] {
      cursor: var(--app-pointer-cursor, pointer);
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.appCursorConfig = {
      hotspotX: 8,
      hotspotY: 8,
      themes: ['tech', 'magic', 'adventure'],
    };

    const appCursorCache = new Map();
    const appCursorLastSelection = new Map();

    function buildCursorValue(path, fallback) {
      const { hotspotX, hotspotY } = window.appCursorConfig;
      return `url("${path}") ${hotspotX} ${hotspotY}, ${fallback}`;
    }

    function applyCursorPath(path) {
      const root = document.documentElement;
      root.style.setProperty('--app-cursor', buildCursorValue(path, 'auto'));
      root.style.setProperty('--app-pointer-cursor', buildCursorValue(path, 'pointer'));
    }

    async function loadCursorManifest(themeName) {
      const response = await fetch(`cursors/${themeName}/manifest.json`, {
        cache: 'no-cache',
      });

      if (!response.ok) {
        return [];
      }

      const payload = await response.json();
      if (!Array.isArray(payload)) {
        return [];
      }

      return payload
        .filter((item) => typeof item === 'string' && item.trim().length > 0)
        .map((item) => `cursors/${themeName}/${item}`);
    }

    function loadCursorCandidates(themeName) {
      if (appCursorCache.has(themeName)) {
        return appCursorCache.get(themeName);
      }

      const loader = loadCursorManifest(themeName);

      appCursorCache.set(themeName, loader);
      return loader;
    }

    window.setAppCursorTheme = async function (themeName) {
      const { themes } = window.appCursorConfig;
      const safeTheme = themes.includes(themeName) ? themeName : 'tech';
      const candidates = await loadCursorCandidates(safeTheme);

      if (candidates.length === 0) {
        return;
      }

      const previousSelection = appCursorLastSelection.get(safeTheme);
      let availablePool = candidates;

      if (candidates.length > 1 && previousSelection) {
        const filtered = candidates.filter((item) => item !== previousSelection);
        if (filtered.length > 0) {
          availablePool = filtered;
        }
      }

      const randomIndex = Math.floor(Math.random() * availablePool.length);
      const nextSelection = availablePool[randomIndex];
      appCursorLastSelection.set(safeTheme, nextSelection);
      applyCursorPath(nextSelection);
    };

    window.setAppCursorTheme('tech');
  </script>
  <script src="https://cdn.jsdelivr.net/gh/Knightro63/flutter_angle/assets/gles_bindings.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
